<!doctype html>
<html lang="en">
  <head>
    <!-- =========================
         BASIC META
    ========================== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- =========================
         SITE TITLE
    ========================== -->
    <title>SkyLine Web Co.</title>

    <!-- =========================
         SEO
    ========================== -->
    <meta
      name="description"
      content="SkyLine Web Co. builds premium digital products, AI systems, SaaS platforms, and modern web experiences for startups and businesses."
    />
    <meta
      name="keywords"
      content="web development, AI integration, SaaS development, chatbot, RAG systems, automation, UI UX design"
    />
    <meta name="author" content="SkyLine Web Co." />

    <!-- =========================
         OPEN GRAPH
    ========================== -->
    <meta property="og:title" content="SkyLine Web Co." />
    <meta
      property="og:description"
      content="AI-powered web development & modern SaaS solutions."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.png" />

    <!-- =========================
         TWITTER
    ========================== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SkyLine Web Co." />
    <meta
      name="twitter:description"
      content="AI-powered web development & modern SaaS solutions."
    />
    <meta name="twitter:image" content="/logo.png" />

    <!-- =========================
         FAVICONS
         (Uses logo.png everywhere)
    ========================== -->
    <link rel="icon" href="/logo.png" sizes="16x16" />
    <link rel="icon" href="/logo.png" sizes="32x32" />
    <link rel="icon" href="/logo.png" sizes="48x48" />
    <link rel="icon" href="/logo.png" sizes="64x64" />
    <link rel="icon" href="/logo.png" sizes="128x128" />
    <link rel="icon" href="/logo.png" sizes="192x192" />
    <link rel="icon" href="/logo.png" sizes="512x512" />

    <link rel="shortcut icon" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />

    <!-- =========================
         PRELOAD LOGO
    ========================== -->
    <link rel="preload" as="image" href="/logo.png" />

    <!-- =========================
         PERFORMANCE
    ========================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- =========================
         FONTS
    ========================== -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
